name: Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: APK build type for manual runs
        required: true
        type: choice
        default: release
        options:
          - release
          - debug
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-android-apk:
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/') || startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Resolve release version
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
          MANUAL_BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$GITHUB_REF_NAME"
            PUBLISH_RELEASE=true
          elif [[ "$EVENT_NAME" == "push" && "$HEAD_MESSAGE" == Release\ v* ]]; then
            VERSION="v$(node -p "require('./package.json').version")"
            PUBLISH_RELEASE=true
          else
            VERSION="v$(node -p "require('./package.json').version")"
            PUBLISH_RELEASE=false
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$MANUAL_BUILD_TYPE" == "debug" ]]; then
            BUILD_TYPE=debug
          else
            BUILD_TYPE=release
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"
          echo "build_type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version split
        run: pnpm check:versions

      - name: Build web assets
        run: pnpm build:client

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Prepare release signing
        id: signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            mkdir -p android/app/keystore
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore/release.jks
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "source=secrets" >> "$GITHUB_OUTPUT"
            echo "keystore_file=keystore/release.jks" >> "$GITHUB_OUTPUT"
            echo "keystore_type=" >> "$GITHUB_OUTPUT"
          else
            FALLBACK_ALIAS="$(keytool -list -storetype PKCS12 -keystore android/app/keystore/community-release.p12 -storepass forwardx-community-release 2>/dev/null | awk -F, '/PrivateKeyEntry/ { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $1); print $1; exit }')"
            if [[ -z "$FALLBACK_ALIAS" ]]; then
              FALLBACK_ALIAS=1
            fi
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "source=fallback" >> "$GITHUB_OUTPUT"
            echo "keystore_file=keystore/community-release.p12" >> "$GITHUB_OUTPUT"
            echo "keystore_type=pkcs12" >> "$GITHUB_OUTPUT"
            echo "key_alias=$FALLBACK_ALIAS" >> "$GITHUB_OUTPUT"
            cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ### Android signing

          Release signing secrets are not configured. This build uses the repository community fallback keystore.
          Configure `ANDROID_KEYSTORE_BASE64`, `ANDROID_KEYSTORE_PASSWORD`, `ANDROID_KEY_ALIAS`, and `ANDROID_KEY_PASSWORD`
          to publish APKs signed with your own private release key.
          EOF
          fi

      - name: Require release signing
        if: steps.release.outputs.build_type == 'release' && steps.signing.outputs.signed != 'true'
        run: |
          echo "Release APK signing secrets are not configured."
          echo "Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
          echo "Use a workflow_dispatch debug build only for local testing."
          exit 1

      - name: Build release APK with repository fallback signing
        if: steps.release.outputs.build_type == 'release' && steps.signing.outputs.source == 'fallback'
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.signing.outputs.keystore_file }}
          ANDROID_KEYSTORE_TYPE: ${{ steps.signing.outputs.keystore_type }}
          ANDROID_KEYSTORE_PASSWORD: forwardx-community-release
          ANDROID_KEY_ALIAS: ${{ steps.signing.outputs.key_alias }}
          ANDROID_KEY_PASSWORD: forwardx-community-release
        run: ./gradlew assembleRelease

      - name: Build release APK with secret signing
        if: steps.release.outputs.build_type == 'release' && steps.signing.outputs.source == 'secrets'
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.signing.outputs.keystore_file }}
          ANDROID_KEYSTORE_TYPE: ${{ steps.signing.outputs.keystore_type }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build debug APK
        if: steps.release.outputs.build_type == 'debug'
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          mkdir -p dist/android
          if [[ -f android/app/build/outputs/apk/release/app-release.apk ]]; then
            cp android/app/build/outputs/apk/release/app-release.apk "dist/android/forwardx-android-${VERSION}.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk "dist/android/forwardx-android-${VERSION}-debug.apk"
            cat > dist/android/README-APK-SIGNING.txt <<'EOF'
          This APK is debug-signed because release signing secrets are not configured.
          Debug APKs are for local testing only and are not uploaded to GitHub Releases.
          To support in-place upgrades, add these repository secrets:
          ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD.
          EOF
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forwardx-android-apk
          path: |
            dist/android/*.apk
            dist/android/*.txt

      - name: Upload APK to GitHub Release
        if: steps.release.outputs.publish_release == 'true' && steps.release.outputs.build_type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: dist/android/*.apk
          fail_on_unmatched_files: true

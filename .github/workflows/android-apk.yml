name: Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version split
        run: pnpm check:versions

      - name: Build web assets
        run: pnpm build:client

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Prepare release signing
        id: signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            mkdir -p android/app/keystore
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore/release.jks
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        if: steps.signing.outputs.signed == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: keystore/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build debug APK
        if: steps.signing.outputs.signed != 'true' && !startsWith(github.ref, 'refs/tags/')
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Require release signing for tag builds
        if: steps.signing.outputs.signed != 'true' && startsWith(github.ref, 'refs/tags/')
        run: |
          echo "Release APK signing secrets are not configured."
          echo "Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
          exit 1

      - name: Rename APK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist/android
          if [[ -f android/app/build/outputs/apk/release/app-release.apk ]]; then
            cp android/app/build/outputs/apk/release/app-release.apk "dist/android/forwardx-android-${VERSION}.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk "dist/android/forwardx-android-${VERSION}-debug.apk"
            cat > dist/android/README-APK-SIGNING.txt <<'EOF'
          This APK is debug-signed because release signing secrets are not configured.
          To support in-place upgrades, add these repository secrets:
          ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD.
          EOF
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forwardx-android-apk
          path: dist/android/*.apk

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/*.apk
          fail_on_unmatched_files: true
